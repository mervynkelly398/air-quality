<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality Monitor | 空气质量可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .search-box { display: flex; justify-content: center; margin-bottom: 30px; }
        input { padding: 12px; width: 60%; border: 1px solid #ccc; border-radius: 6px 0 0 6px; font-size: 16px; outline: none; }
        button { padding: 12px 24px; background-color: #3498db; color: white; border: none; border-radius: 0 6px 6px 0; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        .dashboard { display: flex; justify-content: space-around; margin-bottom: 30px; text-align: center; }
        .card { background: #fdfdfd; padding: 20px; border-radius: 8px; width: 30%; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .card h3 { margin-top: 0; color: #7f8c8d; font-size: 14px; }
        .value { font-size: 28px; font-weight: bold; color: #2c3e50; margin: 10px 0; }
        .alert { background-color: #fff3cd; color: #856404; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 30px; font-weight: bold; display: none; }
        #chart { width: 100%; height: 400px; }
        .loading { text-align: center; color: #666; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 Air Quality Monitor</h1>
    
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="请输入城市名称 (例如: Osaka, Tokyo, Beijing)" value="Osaka">
        <button onclick="fetchData()">查询</button>
    </div>

    <div id="alertBox" class="alert">
        ⚠️ 提示：当前空气质量较差，建议出门佩戴口罩！
    </div>

    <div id="loading" class="loading">正在加载传感器数据...</div>

    <div class="dashboard" id="dashboard" style="display: none;">
        <div class="card">
            <h3>空气质量指数 (AQI)</h3>
            <div class="value" id="aqiValue">--</div>
            <div id="aqiDesc" style="font-size: 14px;">--</div>
        </div>
        <div class="card">
            <h3>PM2.5 浓度</h3>
            <div class="value" id="pm25Value">-- <span style="font-size: 14px">μg/m³</span></div>
        </div>
        <div class="card">
            <h3>温湿度 (Temp / Hum)</h3>
            <div class="value" id="tempHumValue">--</div>
        </div>
    </div>

    <div id="chart"></div>
</div>

<script>
    // ⚠️ 注意：请在 OpenWeather 官网免费注册并替换为你的 API Key
    const API_KEY = '1a0fd88653c4e3b3b106b148929fc0f6'; 
    let myChart = echarts.init(document.getElementById('chart'));

    async function fetchData() {
        const city = document.getElementById('cityInput').value.trim();
        if (!city) {
            alert('请输入城市名称！');
            return;
        }

        if (API_KEY === 'OpenWeather 官网免费注册并替换为你的 API Key') {
            alert('请先在代码中填入你的 OpenWeather API Key！');
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';

        try {
            // 1. 获取城市的经纬度 (Geocoding API)
            const geoRes = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${city}&limit=1&appid=${API_KEY}`);
            const geoData = await geoRes.json();
            
            if (geoData.length === 0) {
                alert('未找到该城市，请检查拼写。');
                document.getElementById('loading').style.display = 'none';
                return;
            }
            const { lat, lon } = geoData[0];

            // 2. 获取当前天气 (温度、湿度)
            const weatherRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`);
            const weatherData = await weatherRes.json();
            document.getElementById('tempHumValue').innerText = `${weatherData.main.temp}°C / ${weatherData.main.humidity}%`;

            // 3. 获取当前空气质量 (Current Air Pollution API)
            const aqiRes = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`);
            const aqiData = await aqiRes.json();
            
            const currentAqi = aqiData.list[0].main.aqi; // 1=Good, 2=Fair, 3=Moderate, 4=Poor, 5=Very Poor
            const currentPm25 = aqiData.list[0].components.pm2_5;
            
            // 更新看板数据
            document.getElementById('aqiValue').innerText = currentAqi;
            document.getElementById('pm25Value').innerHTML = `${currentPm25} <span style="font-size: 14px">μg/m³</span>`;
            
            // 空气质量评级与口罩提醒逻辑
            const aqiDescMap = { 1: '优 (Good)', 2: '良 (Fair)', 3: '中 (Moderate)', 4: '差 (Poor)', 5: '极差 (Very Poor)' };
            document.getElementById('aqiDesc').innerText = aqiDescMap[currentAqi];
            
            if (currentAqi >= 3) {
                document.getElementById('alertBox').style.display = 'block';
            } else {
                document.getElementById('alertBox').style.display = 'none';
            }

            // 4. 获取历史/预测空气质量用于绘制折线图 (Forecast Air Pollution API)
            const forecastRes = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}`);
            const forecastData = await forecastRes.json();

            // 提取前20个数据点绘制图表
            const chartData = forecastData.list.slice(0, 20);
            const timeLabels = chartData.map(item => {
                let date = new Date(item.dt * 1000);
                return `${date.getMonth()+1}-${date.getDate()} ${date.getHours()}:00`;
            });
            const pm25Trend = chartData.map(item => item.components.pm2_5);

            renderChart(city, timeLabels, pm25Trend);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';

        } catch (error) {
            console.error(error);
            alert('获取数据失败，请检查网络或API Key。');
            document.getElementById('loading').style.display = 'none';
        }
    }

    function renderChart(city, times, data) {
        const option = {
            title: { text: `${city} - PM2.5 预测趋势`, left: 'center' },
            tooltip: { trigger: 'axis' },
            xAxis: { 
                type: 'category', 
                data: times,
                axisLabel: { rotate: 45 } // 标签倾斜防重叠
            },
            yAxis: { type: 'value', name: 'PM2.5 (μg/m³)' },
            series: [{
                data: data,
                type: 'line',
                smooth: true, // 平滑曲线
                areaStyle: { opacity: 0.2 }, // 底部阴影加分项
                itemStyle: { color: '#3498db' }
            }]
        };
        myChart.setOption(option);
    }

    // 监听窗口大小变化，图表自适应
    window.addEventListener('resize', () => { myChart.resize(); });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCity Monitor | 大気環境可視化</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #2c3e50; margin-bottom: 5px; }
        .header p { color: #7f8c8d; font-size: 14px; }
        
        .search-box { display: flex; justify-content: center; margin-bottom: 30px; }
        input { padding: 12px 20px; width: 60%; border: 2px solid #eee; border-radius: 8px 0 0 8px; font-size: 16px; outline: none; }
        button { padding: 12px 25px; background-color: #3498db; color: white; border: none; border-radius: 0 8px 8px 0; cursor: pointer; font-size: 16px; font-weight: bold; }
        
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { padding: 20px; border-radius: 12px; text-align: center; transition: all 0.3s; background-color: #fff; border: 1px solid #eee; }
        .card h3 { margin-top: 0; font-size: 14px; color: #666; }
        .value { font-size: 32px; font-weight: bold; margin: 10px 0; }
        .detail { font-size: 14px; color: #555; line-height: 1.5; }
        
        .advice-box { padding: 15px; border-radius: 8px; margin-bottom: 30px; text-align: center; font-weight: bold; display: none; }
        #chart { width: 100%; height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌍 EcoCity Monitor</h1>
        <p>SDGs Goal 11 & 13 大気環境と気候変動の監視</p>
    </div>
    
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="都市名を入力 (例: Kyoto, Osaka)" value="Kyoto">
        <button onclick="fetchData()">検索</button>
    </div>

    <div id="adviceBox" class="advice-box"></div>

    <div class="dashboard" id="dashboard" style="display: none;">
        <div class="card" id="aqiCard">
            <h3>空気質指数 (AQI)</h3>
            <div class="value" id="aqiValue">--</div>
            <div class="detail" id="aqiDesc">--</div>
        </div>
        <div class="card" id="pm25Card">
            <h3>PM2.5 濃度</h3>
            <div class="value" id="pm25Value">--</div>
            <div class="detail">μg/m³</div>
        </div>
        <div class="card">
            <h3>気象条件 (風・温湿度)</h3>
            <div class="detail" id="weatherDetails" style="font-size: 16px; margin-top: 15px;">--</div>
        </div>
    </div>

    <div id="chart"></div>
</div>

<script>
    const API_KEY = '1a0fd88653c4e3b3b106b148929fc0f6'; 
    let myChart = echarts.init(document.getElementById('chart'));

    async function fetchData() {
        const city = document.getElementById('cityInput').value.trim();
        if (!city || API_KEY === 'YOUR_OPENWEATHER_API_KEY') {
            alert('都市名とAPIキーを確認してください。');
            return;
        }

        try {
            const geoRes = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${city}&limit=1&appid=${API_KEY}`);
            const geoData = await geoRes.json();
            if (geoData.length === 0) return alert('都市が見つかりません');
            const { lat, lon } = geoData[0];

            const [weatherRes, aqiRes] = await Promise.all([
                fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`),
                fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`)
            ]);
            
            const weatherData = await weatherRes.json();
            const aqiData = await aqiRes.json();

            updateDashboard(weatherData, aqiData);

            const forecastRes = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}`);
            const forecastData = await forecastRes.json();
            renderChart(city, forecastData.list.slice(0, 24));

        } catch (error) {
            alert('データの取得に失敗しました。');
        }
    }

    function updateDashboard(weather, aqiWrap) {
        const aqi = aqiWrap.list[0].main.aqi;
        const pm25 = aqiWrap.list[0].components.pm2_5;
        
        document.getElementById('aqiValue').innerText = aqi;
        document.getElementById('pm25Value').innerText = pm25;
        
        const windSpeed = weather.wind.speed;
        document.getElementById('weatherDetails').innerHTML = 
            `💨 風速: ${windSpeed} m/s<br>🌡 気温: ${weather.main.temp}°C<br>💧 湿度: ${weather.main.humidity}%`;

        let bgColor, textColor, statusText, adviceText;

        if (aqi <= 2) {
            bgColor = '#e8f8f5'; 
            textColor = '#2ecc71'; 
            statusText = '良好 (Good)';
            adviceText = '🌱 空気は綺麗です。徒歩や自転車での移動を推奨します。';
        } else if (aqi === 3) {
            bgColor = '#fef9e7'; 
            textColor = '#f1c40f'; 
            statusText = '普通 (Moderate)';
            adviceText = '⚠️ 少し汚れがあります。公共交通機関を利用しましょう。';
        } else {
            bgColor = '#fdedec'; 
            textColor = '#e74c3c'; 
            statusText = '悪い (Poor)';
            adviceText = '🛑 大気汚染が深刻です。外出時のマスク着用をお願いします。';
        }

        const aqiCard = document.getElementById('aqiCard');
        const pm25Card = document.getElementById('pm25Card');
        const adviceBox = document.getElementById('adviceBox');

        aqiCard.style.backgroundColor = bgColor;
        pm25Card.style.backgroundColor = bgColor;
        
        const aqiValueEl = document.getElementById('aqiValue');
        const pm25ValueEl = document.getElementById('pm25Value');
        aqiValueEl.style.color = textColor;
        pm25ValueEl.style.color = textColor;

        document.getElementById('aqiDesc').innerText = statusText;
        document.getElementById('aqiDesc').style.color = textColor;

        adviceBox.innerText = adviceText;
        adviceBox.style.backgroundColor = bgColor;
        adviceBox.style.color = textColor;
        adviceBox.style.display = 'block';
        
        document.getElementById('dashboard').style.display = 'grid';
    }

    function renderChart(city, list) {
        const times = list.map(item => {
            const date = new Date(item.dt * 1000);
            return `${date.getHours()}:00`;
        });
        const pm25Data = list.map(item => item.components.pm2_5);
        const no2Data = list.map(item => item.components.no2);

        const option = {
            title: { text: `${city} - 24時間の推移予測`, left: 'center' },
            tooltip: { trigger: 'axis' },
            legend: { data: ['PM2.5', 'NO2'], bottom: 0 },
            toolbox: { 
                feature: { 
                    saveAsImage: { title: '画像として保存' } 
                } 
            },
            xAxis: { type: 'category', data: times },
            yAxis: { type: 'value', name: '濃度' },
            series: [
                { name: 'PM2.5', data: pm25Data, type: 'line', smooth: true, itemStyle: {color: '#2ecc71'} },
                { name: 'NO2', data: no2Data, type: 'line', smooth: true, itemStyle: {color: '#e74c3c'} }
            ]
        };
        myChart.setOption(option);
    }

    window.onresize = () => myChart.resize();
</script>

</body>
</html>
